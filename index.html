<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zombie House — 3D</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; user-select: none; }
    #three-canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

    /* UI Overlay */
    #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

    /* Joystick */
    #joystick-zone {
      position: fixed; bottom: 20px; left: 20px;
      width: 130px; height: 130px;
      pointer-events: all;
    }
    #joystick-base {
      position: absolute; bottom: 0; left: 0;
      width: 110px; height: 110px;
      border-radius: 50%;
      background: rgba(200,200,200,0.25);
      border: 2px solid rgba(255,255,255,0.4);
    }
    #joystick-knob {
      position: absolute;
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(220,220,220,0.55);
      border: 2px solid rgba(255,255,255,0.7);
      top: 33px; left: 33px;
      transition: none;
    }

    /* Attack button */
    #atk-btn {
      position: fixed; bottom: 30px; right: 30px;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(230,150,50,0.5);
      border: 3px solid rgba(255,255,255,0.7);
      pointer-events: all;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: #fff; font-weight: bold;
      text-shadow: 0 0 6px #000;
    }

    /* Zombie counter */
    #zombie-count {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      font: bold 22px Arial; color: #fff;
      text-shadow: 0 0 6px #000, 0 2px 4px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    #points-display {
      position: fixed; top: 14px; right: 15px;
      font: bold 20px Arial; color: #ffdd44;
      text-shadow: 0 0 6px #000, 0 2px 4px rgba(0,0,0,0.8);
      pointer-events: none;
    }
    /* Hearts */
    #hearts {
      position: fixed; top: 14px; left: 15px;
      font-size: 22px;
      pointer-events: none;
    }
    #overlay { font-family: Arial, sans-serif; color: #fff; text-align: center; }
  </style>
</head>
<body>
<canvas id="three-canvas"></canvas>

<!-- UI Overlay -->
<div id="ui">
  <div id="joystick-zone">
    <div id="joystick-base"></div>
    <div id="joystick-knob"></div>
  </div>
  <div id="atk-btn">✦</div>
  <div id="zombie-count">Zombies: 0</div>
  <div id="points-display">0 pts</div>
  <div id="hearts">❤️❤️❤️</div>
  <div id="overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);pointer-events:all;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;">
    <div id="overlay-title" style="font-size:48px;font-weight:bold;text-shadow:3px 3px 0 #000;margin-bottom:20px;">VICTOIRE !</div>
    <div id="overlay-points" style="font-size:24px;color:#ffdd44;text-shadow:2px 2px 0 #000;margin-bottom:30px;">0 points</div>
    <div id="overlay-actions" style="font-size:18px;color:#aaa;text-shadow:1px 1px 0 #000;">
      <div style="margin:8px 0;cursor:pointer;" id="btn-restart">[R] Recommencer</div>
      <div style="margin:8px 0;cursor:pointer;display:none;" id="btn-replay">[R] Rejouer (-100 pts)</div>
      <div style="margin:8px 0;cursor:pointer;display:none;" id="btn-menu">[M] Menu</div>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';

// ==================== CONFIG ====================
const TILE_PX = 40;
const PLAYER_SPEED = 160 / TILE_PX;

// Tile types (internal)
const GND=0, WALL=1, WDEST=2, BUSH=3, WATER=4,
      CARPET=5, STONE=6, DIRT=7, GRAVEL=8, WOOD=9, DOOR=10,
      BATHROOM=11, WORN_CARPET=12, FURNITURE=13;

const DECO_NONE=-1, DECO_BONES=0, DECO_SKULL=1, DECO_CRACK=2, DECO_WEB=3,
      DECO_BLOOD=4, DECO_PEBBLES=5, DECO_GRASS_TUFT=6, DECO_MUSHROOM=7,
      DECO_TORCH=8, DECO_PUDDLE=9,
      DECO_FALLEN_BOOKS=10, DECO_KITCHEN_UTENSILS=11, DECO_BROKEN_TOYS=12,
      DECO_BROKEN_MIRROR=13, DECO_WATER_PUDDLE=14;

// Map dimensions (set after JSON load)
let COLS = 40, ROWS = 32;

// ==================== MAP (populated from JSON) ====================
let MAP=[], DECO=[];
let furnitureList = [];
let surpriseSpawns = [];
let bossSpawn = null;
let triggeredSurprises = new Set();
let bossTriggered = false;

// ==================== SEEDED RANDOM ====================
function hash(r,c,s){let h=(r*374761393+c*668265263+(s||0)*1274126177)^0x5bd1e995;h=Math.imul(h^(h>>>15),0x27d4eb2d);return(h^(h>>>13))>>>0;}
function hashF(r,c,s){return hash(r,c,s)/4294967296;}

// ==================== GAME STATE ====================
const state = {
  player: {
    x: 20 + 0.5, y: 14 + 0.5,
    hp: 6, maxHp: 6,
    name: 'Angel',
    frame: 0, animTimer: 0,
    moving: false,
    bobTimer: 0, bobY: 0,
    facingDx: 0, facingDy: 1,
    facingDown: false,
    angle: 0,
    invincible: 0,
    points: 0,
  },
  zombies: [],
  projectiles: [],
  particles: [],
  dmgNumbers: [],
  gameTime: 0,
  mapVersion: 0,
  gameState: 'loading',
};

function spawnZ(c,r,hp,spd,col,name,isBoss){
  const z = {
    x: c+0.5, y: r+0.5,
    hp, maxHp: hp,
    speed: spd / TILE_PX,
    color: col, name,
    frame: 0, animTimer: 0,
    bobTimer: Math.random()*6.28, bobY: 0,
    hitCooldown: 0,
    facingDx: 0, facingDy: 1,
    angle: 0,
    moving: false,
    isBoss: !!isBoss,
  };
  state.zombies.push(z);
  return z;
}

// ==================== MAP LOADING FROM JSON ====================
const groundNameToId = {
  'grass':GND, 'stone':STONE, 'dirt':DIRT, 'gravel':GRAVEL,
  'wood_light':WOOD, 'carpet':CARPET, 'water':WATER, 'door':DOOR,
  'bathroom_tile':BATHROOM, 'worn_carpet':WORN_CARPET,
};
const groundJsonToInternal = [GND, STONE, DIRT, GRAVEL, WOOD, CARPET, WATER, DOOR, BATHROOM, WORN_CARPET];

const decoNameToId = {
  'bones':DECO_BONES, 'skull':DECO_SKULL, 'crack':DECO_CRACK, 'web':DECO_WEB,
  'blood':DECO_BLOOD, 'pebbles':DECO_PEBBLES, 'grass_tuft':DECO_GRASS_TUFT,
  'mushroom':DECO_MUSHROOM, 'torch':DECO_TORCH, 'puddle':DECO_PUDDLE,
  'fallen_books':DECO_FALLEN_BOOKS, 'kitchen_utensils':DECO_KITCHEN_UTENSILS,
  'broken_toys':DECO_BROKEN_TOYS, 'broken_mirror':DECO_BROKEN_MIRROR,
  'water_puddle':DECO_WATER_PUDDLE,
};

async function loadMapJSON(url) {
  const resp = await fetch(url);
  const json = await resp.json();

  COLS = json.cols;
  ROWS = json.rows;

  // Init arrays
  MAP.length = 0;
  DECO.length = 0;
  for(let r=0; r<ROWS; r++){
    MAP[r] = new Array(COLS).fill(GND);
    DECO[r] = new Array(COLS).fill(DECO_NONE);
  }

  // Ground
  for(let r=0; r<ROWS; r++){
    for(let c=0; c<COLS; c++){
      const v = json.ground[r][c];
      MAP[r][c] = groundJsonToInternal[v] ?? GND;
    }
  }

  // Walls — support both formats: [r,c] pairs or {type:'row',...} objects
  if(json.walls){
    for(const w of (json.walls.indestructible||[])){
      if(Array.isArray(w)){
        const [r,c] = w;
        if(r<ROWS && c<COLS) MAP[r][c] = WALL;
      } else if(w.type==='row'){
        for(let c=w.c1; c<=w.c2; c++) MAP[w.r][c] = WALL;
      } else if(w.type==='col'){
        for(let r=w.r1; r<=w.r2; r++) MAP[r][w.c] = WALL;
      }
    }
    for(const w of (json.walls.destructible||[])){
      const [r,c] = Array.isArray(w) ? w : [w.r, w.c];
      if(r<ROWS && c<COLS) MAP[r][c] = WDEST;
    }
  }

  // Doors (override wall to DOOR)
  for(const [r,c] of (json.doors||[])){
    if(r<ROWS && c<COLS) MAP[r][c] = DOOR;
  }

  // Bushes — support both 'bushes' and 'bushPositions' keys
  const bushData = json.bushes || json.bushPositions || [];
  for(const [r,c] of bushData){
    if(r<ROWS && c<COLS && (MAP[r][c]===GND || MAP[r][c]===GRAVEL)) MAP[r][c] = BUSH;
  }

  // Furniture -> mark tiles as FURNITURE for collision
  furnitureList = [];
  for(const f of (json.furniture||[])){
    const fw = f.w || 1, fh = f.h || 1;
    furnitureList.push({type: f.type, r: f.r, c: f.c, w: fw, h: fh});
    for(let dr=0; dr<fh; dr++){
      for(let dc=0; dc<fw; dc++){
        const rr = f.r+dr, cc = f.c+dc;
        if(rr<ROWS && cc<COLS) MAP[rr][cc] = FURNITURE;
      }
    }
  }

  // Decorations
  for(const dec of (json.decorations||[])){
    const did = decoNameToId[dec.type];
    if(did !== undefined && dec.r<ROWS && dec.c<COLS){
      DECO[dec.r][dec.c] = did;
    }
  }

  // Spawns
  if(json.spawns){
    const sp = json.spawns;
    if(sp.player){
      state.player.x = sp.player.col + 0.5;
      state.player.y = sp.player.row + 0.5;
    }
    for(const z of (sp.zombies||[])){
      const t = z.type || 'normal';
      if(t==='normal') spawnZ(z.col, z.row, 1, 38, '#5a8f3c', 'Zombie');
      else if(t==='medium') spawnZ(z.col, z.row, 2, 48, '#7a6a2a', 'Z.Moyen');
      else if(t==='rage') spawnZ(z.col, z.row, 3, 60, '#8b2020', 'Z.Rage');
    }
    // Surprise spawns (deferred)
    surpriseSpawns = (sp.surprises || []).map(s => {
      const trig = s.trigger || {};
      return {
        col: s.col, row: s.row,
        triggerCol: trig.col ?? s.triggerCol,
        triggerRow: trig.row ?? s.triggerRow,
        radius: trig.radius ?? s.radius ?? 3,
        triggered: false,
      };
    });
    // Boss
    if(sp.boss){
      const trigger = sp.boss.trigger || {};
      bossSpawn = {
        col: sp.boss.col, row: sp.boss.row,
        wardrobeCol: trigger.c ?? sp.boss.wardrobeCol,
        wardrobeRow: trigger.r ?? sp.boss.wardrobeRow,
      };
    }
  }

  return json;
}

// ==================== INPUT ====================
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

let joyActive = false, joyStart = {x:0,y:0}, joyDelta = {x:0,y:0};
const JOY_R = 55, JOY_DEAD = 12;
const joyZone = document.getElementById('joystick-zone');
const joyKnob = document.getElementById('joystick-knob');
const atkBtn = document.getElementById('atk-btn');

joyZone.addEventListener('touchstart', e => {
  for(const t of e.changedTouches){
    joyActive = true;
    joyStart = {x: t.clientX, y: t.clientY};
    joyDelta = {x:0, y:0};
  }
  e.preventDefault();
}, {passive: false});

joyZone.addEventListener('touchmove', e => {
  for(const t of e.changedTouches){
    if(joyActive){
      joyDelta.x = t.clientX - joyStart.x;
      joyDelta.y = t.clientY - joyStart.y;
      const l = Math.min(Math.hypot(joyDelta.x, joyDelta.y), JOY_R);
      const a = Math.atan2(joyDelta.y, joyDelta.x);
      joyKnob.style.left = (33 + Math.cos(a)*l*0.5) + 'px';
      joyKnob.style.top  = (33 + Math.sin(a)*l*0.5) + 'px';
    }
  }
  e.preventDefault();
}, {passive: false});

joyZone.addEventListener('touchend', e => {
  joyActive = false;
  joyDelta = {x:0, y:0};
  joyKnob.style.left = '33px';
  joyKnob.style.top  = '33px';
  e.preventDefault();
}, {passive: false});

atkBtn.addEventListener('touchstart', e => { tryShoot(); e.preventDefault(); }, {passive: false});
atkBtn.addEventListener('mousedown', e => { tryShoot(); });
window.addEventListener('keydown', e => { if(e.key===' '||e.code==='Space'){ tryShoot(); e.preventDefault(); } });
window.addEventListener('mousedown', e => { if(e.button===0) tryShoot(); });

function getMove(){
  let dx=0, dy=0;
  if(keys['z']||keys['w']||keys['arrowup']) dy=-1;
  if(keys['s']||keys['arrowdown']) dy=1;
  if(keys['q']||keys['a']||keys['arrowleft']) dx=-1;
  if(keys['d']||keys['arrowright']) dx=1;
  if(joyActive){
    const l = Math.hypot(joyDelta.x, joyDelta.y);
    if(l > JOY_DEAD){ dx += joyDelta.x/l; dy += joyDelta.y/l; }
  }
  const l = Math.hypot(dx,dy);
  if(l>0){ dx/=l; dy/=l; }
  return {dx, dy};
}

// ==================== SHOOTING ====================
let lastShot = 0;
function tryOpenDoor(){
  // Check if player is near a closed door — open it
  const p = state.player;
  if(!renderer3d || !renderer3d.doorMeshes) return false;
  for(const dg of renderer3d.doorMeshes){
    const dd = dg.userData;
    if(dd.isOpen) continue;
    const dist = Math.hypot(p.x - (dd.c + 0.5), p.y - (dd.r + 0.5));
    if(dist < 1.8){
      // Open the door
      dd.isOpen = true;
      MAP[dd.r][dd.c] = DOOR; // make walkable again
      // Animate: rotate the door pivot
      const pivot = dd.doorPivot;
      if(pivot){
        pivot.rotation.y = dd.isHoriz ? -Math.PI / 2 : -Math.PI / 2;
      }
      // SFX door creak
      playSFX(80, 0.3, 'sawtooth');
      setTimeout(() => playSFX(60, 0.2, 'sine'), 100);
      return true;
    }
  }
  return false;
}

function tryShoot(){
  const now = performance.now();
  if(now - lastShot < 250) return;
  // Try to open a door first
  if(tryOpenDoor()) { lastShot = now; return; }
  lastShot = now;
  const p = state.player;
  let closest = null, minD = Infinity;
  for(const z of state.zombies){
    if(z.hp<=0) continue;
    const d = Math.hypot(z.x - p.x, z.y - p.y);
    if(d < minD){ minD = d; closest = z; }
  }
  let dx = 0, dy = -1;
  if(closest){
    dx = closest.x - p.x; dy = closest.y - p.y;
    const l = Math.hypot(dx,dy); dx/=l; dy/=l;
  }
  state.projectiles.push({
    x: p.x, y: p.y,
    dx, dy,
    speed: 380/TILE_PX,
    life: 0.7, timer: 0,
    trail: [],
  });
  sfxShoot();
}

// ==================== COLLISION ====================
function walkable(px, py, rad){
  const r = rad || 8/TILE_PX;
  for(const [ox,oy] of [[-r,-r],[r,-r],[-r,r],[r,r]]){
    const c = Math.floor(px+ox), row = Math.floor(py+oy);
    if(row<0||row>=ROWS||c<0||c>=COLS) return false;
    const t = MAP[row][c];
    if(t===WALL||t===WDEST||t===WATER||t===FURNITURE) return false;
  }
  return true;
}

// ==================== AUDIO ====================
let audioCtx=null,musicGain=null,sfxGain=null;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=audioCtx.createGain();musicGain.gain.value=0.3;musicGain.connect(audioCtx.destination);
  sfxGain=audioCtx.createGain();sfxGain.gain.value=0.5;sfxGain.connect(audioCtx.destination);
  // Dark ambient music loop
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*4,audioCtx.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++){const t=i/audioCtx.sampleRate;
    data[i]=(Math.sin(t*55)*0.15+Math.sin(t*82.5)*0.1+Math.sin(t*110)*0.08+Math.sin(t*165*Math.sin(t*0.5))*0.05)*(0.8+Math.sin(t*0.3)*0.2);}
  const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;src.connect(musicGain);src.start();
}
function playSFX(freq,dur,type){
  if(!audioCtx)return;
  const osc=audioCtx.createOscillator();const g=audioCtx.createGain();
  osc.type=type||'square';osc.frequency.value=freq;
  g.gain.setValueAtTime(0.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  osc.connect(g);g.connect(sfxGain);osc.start();osc.stop(audioCtx.currentTime+dur);
}
function sfxShoot(){playSFX(800,0.1,'sine');playSFX(600,0.08,'square');}
function sfxHit(){playSFX(200,0.15,'sawtooth');}
function sfxZombieDie(){playSFX(150,0.3,'sawtooth');playSFX(100,0.4,'sine');}
function sfxPlayerHit(){playSFX(120,0.2,'square');playSFX(80,0.3,'sine');}
function sfxVictory(){playSFX(523,0.15,'sine');setTimeout(()=>playSFX(659,0.15,'sine'),150);setTimeout(()=>playSFX(784,0.3,'sine'),300);}
function sfxGameOver(){playSFX(200,0.3,'sine');setTimeout(()=>playSFX(150,0.3,'sine'),200);setTimeout(()=>playSFX(100,0.5,'sine'),400);}
function sfxRoar(){playSFX(80,0.5,'sawtooth');playSFX(60,0.6,'square');setTimeout(()=>playSFX(50,0.4,'sawtooth'),200);}
function sfxSurprise(){playSFX(300,0.15,'square');playSFX(400,0.12,'sine');}
['mousedown','touchstart','keydown'].forEach(ev=>window.addEventListener(ev,initAudio,{once:false}));

// ==================== UPDATE ====================
let gameTimeState = 0;
function update(dt){
  if(state.gameState!=='playing')return;
  const s = dt/1000;
  gameTimeState += s;
  state.gameTime = gameTimeState;

  const p = state.player;
  if(p.invincible>0) p.invincible-=dt;
  const {dx, dy} = getMove();
  p.moving = dx!==0 || dy!==0;

  if(p.moving){
    p.facingDx = dx; p.facingDy = dy;
    p.angle = Math.atan2(dx, dy);
    if(dy > 0.3) p.facingDown = true;
    else if(dy < -0.3) p.facingDown = false;
    const nx = p.x + dx*PLAYER_SPEED*s;
    const ny = p.y + dy*PLAYER_SPEED*s;
    if(walkable(nx, ny)){ p.x=nx; p.y=ny; }
    else if(walkable(nx, p.y)) p.x=nx;
    else if(walkable(p.x, ny)) p.y=ny;
  }
  p.bobTimer += s*6;
  p.bobY = p.moving ? Math.sin(p.bobTimer)*3/TILE_PX : Math.sin(p.bobTimer*2)*1.5/TILE_PX;
  p.animTimer += dt;
  if(p.animTimer > 150){ p.animTimer=0; p.frame=(p.frame+1)%(p.moving?6:4); }

  // ---- Surprise trigger zones ----
  for(const s of surpriseSpawns){
    if(s.triggered) continue;
    const dx2 = p.x - (s.triggerCol+0.5), dy2 = p.y - (s.triggerRow+0.5);
    if(Math.hypot(dx2,dy2) < s.radius){
      s.triggered = true;
      triggeredSurprises.add(s);
      const sz = spawnZ(s.col, s.row, 1, 42, '#5a8f3c', 'Zombie');
      sfxSurprise();
      spawnParts(s.col+0.5, s.row+0.5, 0x88ff44, 12);
      if(renderer3d && renderer3d._addZombieMesh) renderer3d._addZombieMesh(sz);
    }
  }

  // ---- Boss trigger: wardrobe destroyed ----
  if(bossSpawn && !bossTriggered){
    const wr = bossSpawn.wardrobeRow, wc = bossSpawn.wardrobeCol;
    // Check if the wardrobe furniture tile was destroyed (shot turns FURNITURE->GND via WDEST path)
    // We mark wardrobe tiles as WDEST so they can be shot
    if(MAP[wr][wc] !== FURNITURE && MAP[wr][wc] !== WDEST){
      bossTriggered = true;
      const bz = spawnZ(bossSpawn.col, bossSpawn.row, 10, 30, '#4a1a4a', 'BOSS', true);
      sfxRoar();
      spawnParts(bossSpawn.col+0.5, bossSpawn.row+0.5, 0xff4444, 16);
      if(renderer3d && renderer3d._addZombieMesh) renderer3d._addZombieMesh(bz);
    }
  }

  for(const z of state.zombies){
    if(z.hp<=0) continue;
    const ddx = p.x-z.x, ddy = p.y-z.y, dist = Math.hypot(ddx,ddy);
    z.moving = dist > 15/TILE_PX;
    if(z.moving){
      const mx = ddx/dist*z.speed*s, my = ddy/dist*z.speed*s;
      z.facingDx = ddx/dist; z.facingDy = ddy/dist;
      z.angle = Math.atan2(ddx/dist, ddy/dist);
      const nx = z.x+mx, ny = z.y+my;
      if(walkable(nx,ny)){ z.x=nx; z.y=ny; }
      else if(walkable(nx,z.y)) z.x=nx;
      else if(walkable(z.x,ny)) z.y=ny;
    }
    z.bobTimer += s*5;
    z.bobY = Math.sin(z.bobTimer)*2/TILE_PX;
    z.animTimer = (z.animTimer||0)+dt;
    if(z.animTimer>180){ z.animTimer=0; z.frame=(z.frame+1)%(z.moving?6:4); }
    const hitDist = z.isBoss ? 22/TILE_PX : 18/TILE_PX;
    if(dist < hitDist && !z.hitCooldown && p.invincible<=0){
      p.hp = Math.max(0, p.hp-1);
      z.hitCooldown = 60;
      p.invincible = 1000;
      state.dmgNumbers.push({x:p.x, y:p.y, text:'-1', timer:0, color:'#ff4444'});
      sfxPlayerHit();
      if(p.hp<=0){state.gameState='gameover';sfxGameOver();}
    }
    if(z.hitCooldown) z.hitCooldown--;
  }

  for(let i=state.projectiles.length-1; i>=0; i--){
    const proj = state.projectiles[i];
    proj.x += proj.dx*proj.speed*s;
    proj.y += proj.dy*proj.speed*s;
    proj.timer += s;
    proj.trail.push({x:proj.x, y:proj.y, a:1});
    if(proj.trail.length>8) proj.trail.shift();
    proj.trail.forEach(t=>t.a*=0.82);
    const tc = Math.floor(proj.x), tr = Math.floor(proj.y);
    if(tc<0||tc>=COLS||tr<0||tr>=ROWS||MAP[tr][tc]===WALL){
      state.projectiles.splice(i,1);
      spawnParts(proj.x, proj.y, 0x44ddff, 4);
      continue;
    }
    if(MAP[tr][tc]===WDEST){
      MAP[tr][tc]=GND;
      state.mapVersion++;
      state.projectiles.splice(i,1);
      spawnWallBreak(proj.x, proj.y);
      continue;
    }
    if(MAP[tr][tc]===FURNITURE){
      // Check if this is the wardrobe (boss trigger) - make it destructible
      let isWardrobe = false;
      if(bossSpawn && !bossTriggered){
        const wr = bossSpawn.wardrobeRow, wc = bossSpawn.wardrobeCol;
        if(tr===wr && tc===wc) isWardrobe = true;
      }
      if(isWardrobe){
        MAP[tr][tc]=GND;
        state.mapVersion++;
        state.projectiles.splice(i,1);
        spawnWallBreak(proj.x, proj.y);
        // Remove from furnitureList
        furnitureList = furnitureList.filter(f => !(f.r===tr && f.c===tc));
        continue;
      }
      // Non-wardrobe furniture blocks projectiles
      state.projectiles.splice(i,1);
      spawnParts(proj.x, proj.y, 0x44ddff, 4);
      continue;
    }
    let hit=false;
    for(const z of state.zombies){
      if(z.hp<=0) continue;
      const hitR = z.isBoss ? 22/TILE_PX : 16/TILE_PX;
      if(Math.hypot(z.x-proj.x, z.y-proj.y) < hitR){
        z.hp--; sfxHit();
        state.dmgNumbers.push({x:z.x, y:z.y, text:''+Math.ceil(100/z.maxHp), timer:0, color:'#ffffff'});
        spawnParts(proj.x, proj.y, 0x44ddff, 3);
        if(z.hp<=0){
          spawnParts(z.x, z.y, 0x55aa33, 8); sfxZombieDie();
          const pts=z.isBoss?50:(z.maxHp===1?10:(z.maxHp===2?20:30));
          p.points+=pts;
          state.dmgNumbers.push({x:z.x, y:z.y-0.5, text:'+'+pts, timer:0, color:'#ffdd44'});
          if(state.zombies.every(zz=>zz.hp<=0)){state.gameState='victory';sfxVictory();}
        }
        hit=true; break;
      }
    }
    if(hit){ state.projectiles.splice(i,1); continue; }
    if(proj.timer > proj.life) state.projectiles.splice(i,1);
  }

  for(let i=state.particles.length-1; i>=0; i--){
    const pt = state.particles[i];
    pt.x += pt.vx*s; pt.y += pt.vy*s;
    pt.timer += s;
    pt.alpha = 1 - pt.timer/pt.life;
    if(pt.timer >= pt.life) state.particles.splice(i,1);
  }

  for(let i=state.dmgNumbers.length-1; i>=0; i--){
    const d = state.dmgNumbers[i];
    d.timer += s;
    d.y -= 55/TILE_PX * s;
    if(d.timer > 0.8) state.dmgNumbers.splice(i,1);
  }

  // Update UI
  const alive = state.zombies.filter(z=>z.hp>0).length;
  document.getElementById('zombie-count').textContent = `Zombies: ${alive}`;
  let hearts = '';
  for(let i=0; i<3; i++){
    hearts += p.hp>=(i+1)*2 ? '❤️' : (p.hp>=i*2+1 ? '💔' : '🖤');
  }
  document.getElementById('hearts').textContent = hearts;
}

function spawnParts(x, y, colorHex, n){
  for(let i=0; i<n; i++){
    const a = Math.random()*6.28, spd = (60+Math.random()*80)/TILE_PX;
    state.particles.push({
      x, y,
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
      colorHex, radius: (2+Math.random()*3)/TILE_PX,
      timer: 0, life: 0.3+Math.random()*0.2, alpha: 1,
    });
  }
}
function spawnWallBreak(x, y){
  for(let i=0; i<8; i++){
    const a = Math.random()*6.28, spd = (80+Math.random()*100)/TILE_PX;
    state.particles.push({
      x: x+(Math.random()*10-5)/TILE_PX,
      y: y+(Math.random()*10-5)/TILE_PX,
      vx: Math.cos(a)*spd,
      vy: Math.sin(a)*spd - 40/TILE_PX,
      colorHex: 0xa88060,
      radius: (3+Math.random()*3)/TILE_PX,
      timer: 0, life: 0.5+Math.random()*0.3, alpha: 1,
    });
  }
}

// ==================== THREE.JS RENDERER ====================
class ThreeRenderer {
  constructor(){
    this.canvas = document.getElementById('three-canvas');
    this.renderer = new THREE.WebGLRenderer({canvas: this.canvas, antialias: true});
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.shadowMap.enabled = false;

    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x1a3a10);
    this.scene.fog = new THREE.Fog(0x1a3a10, 22, 50);

    this.camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
    this.camTarget = new THREE.Vector3();
    this.camera.position.set(20, 12, 14+10);
    this.camera.lookAt(20, 0, 14);

    // Lighting
    const amb = new THREE.AmbientLight(0xffffff, 0.6);
    this.scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffeedd, 0.8);
    dir.position.set(-5, 10, 5);
    this.scene.add(dir);

    // Maps
    this.lastMapVersion = -1;
    this.wallMeshIndestructible = null;
    this.wallMeshDestructible = null;
    this.wallDataIndestructible = []; // {row,col}
    this.wallDataDestructible = [];

    // Character meshes
    this.playerMesh = null;
    this.playerShadow = null;
    this.playerHalo = null;

    this.zombieMeshes = []; // array of {group, shadow, halo, z ref}

    // Projectile pool
    this.projPool = [];
    this.activeProjMeshes = new Map(); // proj index -> mesh

    // Particle pool
    this.particlePool = [];
    this.activeParticles = [];

    // Damage number sprites
    this.dmgSprites = [];

    // Torch point lights
    this.torchLights = [];

    // Water mesh
    this.waterMesh = null;
    this.waterGeo = null;

    // Bush meshes
    this.bushMeshes = [];

    // Furniture meshes
    this.furnitureMeshes = [];

    this._buildScene();

    window.addEventListener('resize', ()=>{
      this.camera.aspect = window.innerWidth/window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  _buildScene(){
    this._buildGround();
    this._buildWalls();
    this._buildBushes();
    this._buildWater();
    this._buildFurniture();
    this._buildTorchLights();
    this.playerMesh = this._buildPlayer();
    this.scene.add(this.playerMesh.group);
    this.playerShadow = this._makeShadow();
    this.scene.add(this.playerShadow);
    this.playerHalo = this._makeHalo(0x44cc44);
    this.scene.add(this.playerHalo);
    for(const z of state.zombies){
      this._addZombieMeshInternal(z);
    }
  }

  _addZombieMeshInternal(z){
    const zm = this._buildZombie(z);
    this.scene.add(zm.group);
    const sh = this._makeShadow();
    this.scene.add(sh);
    const hl = this._makeHalo(0xcc3333);
    this.scene.add(hl);
    this.zombieMeshes.push({group: zm.group, parts: zm, shadow: sh, halo: hl, zRef: z});
  }

  _addZombieMesh(z){
    this._addZombieMeshInternal(z);
  }

  // ---- Ground (from HQ atlas textures) ----
  _buildGround(){
    const cs = 64; // pixels per tile in ground texture (downscaled from 128 atlas)
    const gCanvas = document.createElement('canvas');
    gCanvas.width = COLS * cs;
    gCanvas.height = ROWS * cs;
    const gCtx = gCanvas.getContext('2d');

    // Load atlas images and draw when ready
    const groundAtlas = new Image();
    const doorAtlas = new Image();
    const decoAtlas = new Image();
    let atlasLoaded = 0;
    const AT = 128; // atlas tile size

    // Tile type to atlas index: grass=0, stone=1, dirt=2, gravel=3, wood=4, carpet=5, water=6, bathroom=7, worn_carpet=8
    const typeToAtlas = {
      [GND]: 0, [BUSH]: 0, [STONE]: 1, [DIRT]: 2, [GRAVEL]: 3,
      [WOOD]: 4, [CARPET]: 5, [WATER]: 6, [DOOR]: -1,
      [WALL]: 0, [WDEST]: 0,
      [BATHROOM]: 7, [WORN_CARPET]: 8,
      [FURNITURE]: 4, // furniture on wood by default
    };
    const decoTypeToAtlas = {
      'bones':0, 'skull':1, 'crack':2, 'web':3, 'blood':4,
      'pebbles':5, 'grass_tuft':6, 'mushroom':7, 'torch':8, 'puddle':9,
      'fallen_books':10, 'kitchen_utensils':11, 'broken_toys':12,
      'broken_mirror':13, 'water_puddle':14,
    };

    const onAtlasLoad = () => {
      atlasLoaded++;
      if(atlasLoaded < 3) return;

      // Draw ground tiles from atlas
      for(let r=0; r<ROWS; r++){
        for(let c=0; c<COLS; c++){
          const t = MAP[r][c];
          const dx = c * cs, dy = r * cs;

          if(t === DOOR){
            // Draw door from door atlas
            const doorVar = hash(r, c, 900) % 3;
            gCtx.drawImage(doorAtlas, doorVar * AT, 0, AT, AT, dx, dy, cs, cs);
          } else {
            const atlasIdx = typeToAtlas[t] ?? 0;
            gCtx.drawImage(groundAtlas, atlasIdx * AT, 0, AT, AT, dx, dy, cs, cs);
          }
        }
      }

      // Draw decorations on top of ground
      for(let r=0; r<ROWS; r++){
        for(let c=0; c<COLS; c++){
          const d = DECO[r][c];
          if(d === DECO_NONE) continue;
          const decoNames = ['bones','skull','crack','web','blood','pebbles','grass_tuft','mushroom','torch','puddle','fallen_books','kitchen_utensils','broken_toys','broken_mirror','water_puddle'];
          const name = decoNames[d];
          if(name === undefined) continue;
          const atlasIdx = decoTypeToAtlas[name];
          if(atlasIdx === undefined) continue;
          const dx = c * cs, dy = r * cs;
          gCtx.drawImage(decoAtlas, atlasIdx * AT, 0, AT, AT, dx, dy, cs, cs);
        }
      }

      // Update texture
      this.groundTex.needsUpdate = true;
    };

    groundAtlas.onload = onAtlasLoad;
    doorAtlas.onload = onAtlasLoad;
    decoAtlas.onload = onAtlasLoad;
    groundAtlas.src = 'public/assets/tilesets/ground-atlas.png';
    doorAtlas.src = 'public/assets/tilesets/door-atlas.png';
    decoAtlas.src = 'public/assets/tilesets/deco-atlas.png';

    // Fill with dark green while loading
    gCtx.fillStyle = '#2d5a1e';
    gCtx.fillRect(0, 0, gCanvas.width, gCanvas.height);

    const tex = new THREE.CanvasTexture(gCanvas);
    tex.wrapS = THREE.ClampToEdgeWrapping;
    tex.wrapT = THREE.ClampToEdgeWrapping;
    tex.magFilter = THREE.LinearFilter;
    tex.minFilter = THREE.LinearFilter;

    const geo = new THREE.PlaneGeometry(COLS, ROWS);
    const mat = new THREE.MeshToonMaterial({map: tex, side: THREE.FrontSide});
    const plane = new THREE.Mesh(geo, mat);
    plane.rotation.x = -Math.PI/2;
    plane.position.set(COLS/2, 0, ROWS/2);
    this.scene.add(plane);
    this.groundTex = tex;
    this.groundCanvas = gCanvas;
    this.groundCtxRef = gCtx;
  }

  // ---- Walls (InstancedMesh) ----
  _buildWalls(){
    this.wallDataIndestructible = [];
    this.wallDataDestructible = [];
    this.doorMeshes = [];
    for(let r=0; r<ROWS; r++){
      for(let c=0; c<COLS; c++){
        if(MAP[r][c]===WALL) this.wallDataIndestructible.push({r,c});
        else if(MAP[r][c]===WDEST) this.wallDataDestructible.push({r,c});
        else if(MAP[r][c]===DOOR){
          // Entrance row (row 28) = just an opening, no 3D door (grand_door handles it)
          if(r === ROWS - 4) continue;
          // Other doors start closed
          this._buildDoor3D(r, c, false);
        }
      }
    }
    this._rebuildWallMeshes();
  }

  _buildDoor3D(r, c, startOpen = false){
    const group = new THREE.Group();
    const H = 0.75;
    const THICKNESS = 0.06; // porte fine

    // Detect wall orientation
    const wallLeft = c > 0 && (this.wallDataIndestructible.some(w=>w.r===r&&w.c===c-1));
    const wallRight = c < COLS-1 && (this.wallDataIndestructible.some(w=>w.r===r&&w.c===c+1));
    const isHoriz = wallLeft || wallRight;

    const frameMat = new THREE.MeshToonMaterial({color: 0x4a2d18});
    const lintelMat = new THREE.MeshToonMaterial({color: 0x6a4530});

    // Door panel — thin plane with texture
    const loader = new THREE.TextureLoader();
    const doorTex = loader.load('public/assets/tilesets/door-atlas.png');
    doorTex.magFilter = THREE.NearestFilter;
    doorTex.colorSpace = THREE.SRGBColorSpace;
    // Use variant based on position hash
    const variant = hash(r, c, 900) % 3;
    doorTex.repeat.set(1/3, 1);
    doorTex.offset.set(variant/3, 0);

    const doorMat = new THREE.MeshToonMaterial({map: doorTex, side: THREE.DoubleSide});

    // Create pivot group for door rotation (hinged opening)
    const doorPivot = new THREE.Group();

    if(isHoriz){
      // Door in horizontal wall — panel faces Z axis, placed at wall edge
      // Frame posts (thin, at edges of tile)
      const pGeo = new THREE.BoxGeometry(0.08, H, 0.08);
      const pL = new THREE.Mesh(pGeo, frameMat); pL.position.set(-0.46, H/2, 0); group.add(pL);
      const pR = new THREE.Mesh(pGeo, frameMat); pR.position.set(0.46, H/2, 0); group.add(pR);
      // Lintel (thin wood beam on top)
      const tGeo = new THREE.BoxGeometry(1, 0.08, 0.1);
      const tM = new THREE.Mesh(tGeo, lintelMat); tM.position.set(0, H + 0.04, 0); group.add(tM);

      // Door panel — thin, fills the opening
      const dGeo = new THREE.PlaneGeometry(0.84, H - 0.02);
      const door = new THREE.Mesh(dGeo, doorMat);
      door.position.set(0.42, 0, 0); // offset to hinge side
      doorPivot.add(door);
      doorPivot.position.set(-0.42, H/2, 0); // pivot at left post
    } else {
      // Door in vertical wall — panel faces X axis
      const pGeo = new THREE.BoxGeometry(0.08, H, 0.08);
      const pL = new THREE.Mesh(pGeo, frameMat); pL.position.set(0, H/2, -0.46); group.add(pL);
      const pR = new THREE.Mesh(pGeo, frameMat); pR.position.set(0, H/2, 0.46); group.add(pR);
      const tGeo = new THREE.BoxGeometry(0.1, 0.08, 1);
      const tM = new THREE.Mesh(tGeo, lintelMat); tM.position.set(0, H + 0.04, 0); group.add(tM);

      const dGeo = new THREE.PlaneGeometry(0.84, H - 0.02);
      const door = new THREE.Mesh(dGeo, doorMat);
      door.rotation.y = Math.PI / 2;
      door.position.set(0, 0, 0.42);
      doorPivot.add(door);
      doorPivot.position.set(0, H/2, -0.42);
    }

    group.add(doorPivot);
    group.position.set(c + 0.5, 0, r + 0.5);
    group.userData = {r, c, isOpen: startOpen, doorPivot, isHoriz};
    this.scene.add(group);
    this.doorMeshes.push(group);

    if(startOpen){
      doorPivot.rotation.y = isHoriz ? -Math.PI / 2 : -Math.PI / 2;
      MAP[r][c] = DOOR;
    } else {
      MAP[r][c] = WALL;
    }
  }

  // Grand door (entrance) uses furniture texture, always open
  _buildGrandDoor(r, c, w){
    const loader = new THREE.TextureLoader();
    const tex = loader.load('public/assets/tilesets/furniture-grand_door.png');
    tex.magFilter = THREE.NearestFilter;
    tex.colorSpace = THREE.SRGBColorSpace;

    const fw = w || 4; // number of tiles wide
    const H = 0.95;
    const W = fw * 0.9; // world units
    const group = new THREE.Group();

    // Frame (thick stone pillars)
    const frameMat = new THREE.MeshToonMaterial({color: 0x5a4a3a});
    const pGeo = new THREE.BoxGeometry(0.2, H, 0.2);
    const pL = new THREE.Mesh(pGeo, frameMat); pL.position.set(-W/2 - 0.1, H/2, 0); group.add(pL);
    const pR = new THREE.Mesh(pGeo, frameMat); pR.position.set(W/2 + 0.1, H/2, 0); group.add(pR);
    // Arch lintel (stone)
    const tGeo = new THREE.BoxGeometry(W + 0.4, 0.15, 0.2);
    const tM = new THREE.Mesh(tGeo, new THREE.MeshToonMaterial({color: 0x6a5a48}));
    tM.position.set(0, H + 0.08, 0); group.add(tM);

    // Left door panel (textured)
    const texL = tex.clone(); texL.needsUpdate = true;
    texL.repeat.set(0.5, 1); texL.offset.set(0, 0);
    const dGeo = new THREE.PlaneGeometry(W/2 - 0.05, H - 0.05);
    const dL = new THREE.Mesh(dGeo, new THREE.MeshToonMaterial({map: texL, side: THREE.DoubleSide}));
    const pivotL = new THREE.Group();
    dL.position.set(W/4, 0, 0);
    pivotL.add(dL);
    pivotL.position.set(-W/2 + 0.05, H/2, 0);
    pivotL.rotation.y = Math.PI / 3.5;
    group.add(pivotL);

    // Right door panel (textured)
    const texR = tex.clone(); texR.needsUpdate = true;
    texR.repeat.set(0.5, 1); texR.offset.set(0.5, 0);
    const dR = new THREE.Mesh(dGeo, new THREE.MeshToonMaterial({map: texR, side: THREE.DoubleSide}));
    const pivotR = new THREE.Group();
    dR.position.set(-W/4, 0, 0);
    pivotR.add(dR);
    pivotR.position.set(W/2 - 0.05, H/2, 0);
    pivotR.rotation.y = -Math.PI / 3.5;
    group.add(pivotR);

    group.position.set(c + fw/2, 0, r + 0.5);
    this.scene.add(group);
  }

  _rebuildWallMeshes(){
    // Remove old
    if(this.wallMeshIndestructible){ this.scene.remove(this.wallMeshIndestructible); this.wallMeshIndestructible.geometry.dispose(); }
    if(this.wallMeshDestructible){ this.scene.remove(this.wallMeshDestructible); this.wallMeshDestructible.geometry.dispose(); }

    // Filter still-existing walls
    this.wallDataIndestructible = this.wallDataIndestructible.filter(w=>MAP[w.r][w.c]===WALL);
    this.wallDataDestructible = this.wallDataDestructible.filter(w=>MAP[w.r][w.c]===WDEST);

    const H_IND = 0.8, H_DES = 0.6;

    // Load wall textures from atlas
    const loader = new THREE.TextureLoader();
    const wallFrontTex = loader.load('public/assets/tilesets/wall-front-atlas.png');
    const wallTopTex = loader.load('public/assets/tilesets/wall-top-atlas.png');
    const wallDestTex = loader.load('public/assets/tilesets/wall-dest-atlas.png');
    [wallFrontTex, wallTopTex, wallDestTex].forEach(t => {
      t.magFilter = THREE.NearestFilter;
      t.minFilter = THREE.LinearFilter;
      t.colorSpace = THREE.SRGBColorSpace;
    });

    // Indestructible walls — individual boxes with atlas textures per face
    for(const {r,c} of this.wallDataIndestructible){
      const wv = hash(r,c,500) % 5; // wall variant
      const hv = hashF(r,c,200);

      // Create per-wall box with textured front face
      const geo = new THREE.BoxGeometry(1, H_IND, 1);

      // Front face texture (from atlas: 5 variants side by side, each 128px)
      const frontMat = new THREE.MeshToonMaterial({color: 0xffffff});
      const frontTex = wallFrontTex.clone();
      frontTex.needsUpdate = true;
      frontTex.repeat.set(1/5, 1);
      frontTex.offset.set(wv/5, 0);
      frontMat.map = frontTex;

      // Top face texture
      const topMat = new THREE.MeshToonMaterial({color: 0xffffff});
      const topTexC = wallTopTex.clone();
      topTexC.needsUpdate = true;
      topTexC.repeat.set(1/5, 1);
      topTexC.offset.set(wv/5, 0);
      topMat.map = topTexC;

      // Side faces: tinted solid color
      const sideColor = new THREE.Color([0x705848, 0x555862, 0x685040, 0x506050, 0x605860][wv]);
      sideColor.r = Math.min(1, sideColor.r + hv*0.08);
      sideColor.g = Math.min(1, sideColor.g + hv*0.06);
      sideColor.b = Math.min(1, sideColor.b + hv*0.05);
      const sideMat = new THREE.MeshToonMaterial({color: sideColor});

      // Box faces: right, left, top, bottom, front, back
      const mats = [sideMat, sideMat, topMat, sideMat, frontMat, frontMat];
      const mesh = new THREE.Mesh(geo, mats);
      mesh.position.set(c+0.5, H_IND/2, r+0.5);
      this.scene.add(mesh);
    }
    // Keep reference for collision but no InstancedMesh needed for now
    this.wallMeshIndestructible = {dispose:()=>{}};

    // Destructible walls — individual boxes with atlas textures
    this._destWallMeshes = [];
    for(const {r,c} of this.wallDataDestructible){
      const wv = hash(r,c,550) % 3;
      const hv = hashF(r,c,201);

      const geo = new THREE.BoxGeometry(1, H_DES, 1);

      // Front/back from destructible atlas (3 variants, but they include face+top in one image)
      // The dest atlas has tiles of 128x(128+42), top part = face dessus, bottom = face avant
      // For simplicity, use the atlas as front face texture
      const frontMat = new THREE.MeshToonMaterial({color: 0xffffff});
      const frontTex = wallDestTex.clone();
      frontTex.needsUpdate = true;
      frontTex.repeat.set(1/3, 128/170); // only the top 128px part (face dessus)
      frontTex.offset.set(wv/3, 42/170); // skip the bottom 42px (face avant)
      frontMat.map = frontTex;

      // Top face = same texture upper part
      const topMat = new THREE.MeshToonMaterial({color: 0xffffff});
      const topTexC = wallDestTex.clone();
      topTexC.needsUpdate = true;
      topTexC.repeat.set(1/3, 128/170);
      topTexC.offset.set(wv/3, 42/170);
      topMat.map = topTexC;

      const sideColor = new THREE.Color([0xa08840, 0x906030, 0x888080][wv]);
      sideColor.r = Math.min(1, sideColor.r + hv*0.06);
      sideColor.g = Math.min(1, sideColor.g + hv*0.06);
      const sideMat = new THREE.MeshToonMaterial({color: sideColor});

      const mats = [sideMat, sideMat, topMat, sideMat, frontMat, frontMat];
      const mesh = new THREE.Mesh(geo, mats);
      mesh.position.set(c+0.5, H_DES/2, r+0.5);
      mesh.userData = {r, c};
      this.scene.add(mesh);
      this._destWallMeshes.push(mesh);
    }
    this.wallMeshDestructible = {dispose:()=>{}};
  }

  // ---- Bushes (billboard sprites from bush.png) ----
  _buildBushes(){
    for(const bm of this.bushMeshes) this.scene.remove(bm);
    this.bushMeshes = [];

    const loader = new THREE.TextureLoader();
    const bushTex = loader.load('public/assets/tilesets/bush.png');
    bushTex.magFilter = THREE.NearestFilter;
    bushTex.minFilter = THREE.LinearFilter;
    bushTex.colorSpace = THREE.SRGBColorSpace;

    for(let r=0; r<ROWS; r++){
      for(let c=0; c<COLS; c++){
        if(MAP[r][c]!==BUSH) continue;
        const bh = hashF(r,c,99);
        const sz = 1.1 + bh * 0.3;

        const mat = new THREE.SpriteMaterial({
          map: bushTex,
          transparent: true,
          depthWrite: false,
          alphaTest: 0.1,
        });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(sz, sz, 1);
        sprite.position.set(c+0.5, sz*0.35, r+0.5);
        sprite.center.set(0.5, 0.2);
        this.scene.add(sprite);
        this.bushMeshes.push(sprite);
      }
    }
  }

  // ---- Water plane ----
  _buildWater(){
    // Find all water tiles
    const waterTiles = [];
    for(let r=0; r<ROWS; r++) for(let c=0; c<COLS; c++) if(MAP[r][c]===WATER) waterTiles.push({r,c});
    if(waterTiles.length===0) return;
    // Create individual small planes per water tile
    this._waterPlanes = [];
    for(const {r,c} of waterTiles){
      const geo = new THREE.PlaneGeometry(1, 1, 4, 4);
      const mat = new THREE.MeshToonMaterial({color: 0x1969aa, transparent: true, opacity: 0.85, depthWrite: false});
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI/2;
      mesh.position.set(c+0.5, 0.02, r+0.5);
      this.scene.add(mesh);
      this._waterPlanes.push({mesh, geo, posAttr: geo.attributes.position, r, c});
    }
    // Keep legacy references for animation
    if(this._waterPlanes.length > 0){
      this.waterGeo = this._waterPlanes[0].geo;
      this._waterPosAttr = this._waterPlanes[0].posAttr;
    }
  }

  // ---- Furniture (3D boxes with texture on top) ----
  _buildFurniture(){
    for(const fm of this.furnitureMeshes) this.scene.remove(fm);
    this.furnitureMeshes = [];

    const loader = new THREE.TextureLoader();

    // Height per furniture type
    const heights = {
      bed: 0.35, long_table: 0.45, bookshelf: 0.8, bathtub: 0.4,
      wardrobe: 0.9, fireplace: 0.6, cradle: 0.35,
      chandelier: 0.05, grand_door: 0.7,
    };

    for(const f of furnitureList){
      const texPath = `public/assets/tilesets/furniture-${f.type}.png`;
      const tex = loader.load(texPath);
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.LinearFilter;
      tex.colorSpace = THREE.SRGBColorSpace;

      const fw = f.w || 1;
      const fh = f.h || 1;
      const H = heights[f.type] || 0.5;

      // Box geometry with texture on top face
      const geo = new THREE.BoxGeometry(fw * 0.95, H, fh * 0.95);

      // Top face: furniture texture. Other faces: tinted wood color
      const topMat = new THREE.MeshToonMaterial({map: tex, color: 0xffffff});
      const sideMat = new THREE.MeshToonMaterial({color: 0x6a4a32});
      const frontMat = new THREE.MeshToonMaterial({color: 0x5a3a28});

      // Grand door — special 3D construction
      if(f.type === 'grand_door'){
        this._buildGrandDoor(f.r, f.c, f.w);
        continue;
      }

      // Chandelier is special — it hangs from ceiling, flat
      if(f.type === 'chandelier'){
        const mat = new THREE.MeshToonMaterial({map: tex, transparent: true, alphaTest: 0.1});
        const cGeo = new THREE.PlaneGeometry(1.2, 1.2);
        const cMesh = new THREE.Mesh(cGeo, mat);
        cMesh.rotation.x = -Math.PI / 2;
        cMesh.position.set(f.c + 0.5, 1.5, f.r + 0.5); // suspended from ceiling
        cMesh.userData = {furniture: f};
        this.scene.add(cMesh);
        this.furnitureMeshes.push(cMesh);
        continue;
      }

      // BoxGeometry faces: +x, -x, +y(top), -y(bottom), +z, -z
      const mats = [sideMat, sideMat, topMat, frontMat, frontMat, sideMat];
      const mesh = new THREE.Mesh(geo, mats);
      mesh.position.set(f.c + fw * 0.5, H / 2, f.r + fh * 0.5);
      mesh.userData = {furniture: f};

      // Outline
      const outGeo = geo.clone();
      const outMat = new THREE.MeshBasicMaterial({color: 0x1a1208, side: THREE.BackSide});
      const outline = new THREE.Mesh(outGeo, outMat);
      outline.scale.set(1.04, 1.04, 1.04);
      mesh.add(outline);

      this.scene.add(mesh);
      this.furnitureMeshes.push(mesh);
    }
  }

  // ---- Torch point lights ----
  _buildTorchLights(){
    for(let r=0; r<ROWS; r++){
      for(let c=0; c<COLS; c++){
        if(DECO[r][c]===DECO_TORCH){
          const light = new THREE.PointLight(0xff9933, 1.2, 6);
          light.position.set(c+0.5, 1.0, r+0.5);
          light.baseIntensity = 1.2;
          this.scene.add(light);
          this.torchLights.push({light, r, c});
        }
      }
    }
  }

  // ---- Player sprite billboard ----
  _buildPlayer(){
    const group = new THREE.Group();

    // Load 4 sprite sheet textures
    const loader = new THREE.TextureLoader();
    const sheets = {
      idleBack:  loader.load('public/assets/sprites/heroes/angel-monster/idle.png'),
      walkBack:  loader.load('public/assets/sprites/heroes/angel-monster/walk.png'),
      idleFront: loader.load('public/assets/sprites/heroes/angel-monster/idle-front.png'),
      walkFront: loader.load('public/assets/sprites/heroes/angel-monster/walk-front.png'),
    };
    // Configure all textures for sprite sheet usage
    for(const key in sheets){
      const tex = sheets[key];
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.NearestFilter;
      tex.colorSpace = THREE.SRGBColorSpace;
      // Don't repeat
      tex.wrapS = THREE.ClampToEdgeWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
    }
    // Set initial frame (idle back, frame 0 of 4)
    const initTex = sheets.idleBack;
    initTex.repeat.set(1/4, 1);
    initTex.offset.set(0, 0);

    // Sprite plane (billboard that always faces camera)
    const spriteMat = new THREE.SpriteMaterial({
      map: initTex,
      transparent: true,
      depthWrite: false,
    });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(1.4, 1.4, 1); // size in world units
    sprite.position.y = 0.7;
    sprite.center.set(0.5, 0.3); // anchor point (bottom-center ish)
    group.add(sprite);

    // Health bar background
    const hbBgGeo = new THREE.PlaneGeometry(0.5, 0.07);
    const hbBgMat = new THREE.MeshBasicMaterial({color: 0x333333, side: THREE.DoubleSide, depthWrite: false, transparent: true});
    const hbBg = new THREE.Mesh(hbBgGeo, hbBgMat);
    hbBg.position.y = 1.45;
    group.add(hbBg);

    // Health bar fill
    const hbGeo = new THREE.PlaneGeometry(0.48, 0.05);
    const hbMat = new THREE.MeshBasicMaterial({color: 0x44dd44, side: THREE.DoubleSide, depthWrite: false, transparent: true});
    const hb = new THREE.Mesh(hbGeo, hbMat);
    hb.position.y = 1.45;
    group.add(hb);

    return {group, hb, hbMat, sprite, spriteMat, sheets, currentSheet: 'idleBack'};
  }

  // ---- Zombie mesh ----
  _buildZombie(z){
    const group = new THREE.Group();

    // Load zombie sprite sheets
    const loader = new THREE.TextureLoader();
    const sheets = {
      idleFront: loader.load('public/assets/sprites/enemies/zombie-normal/idle-front.png'),
      idleBack:  loader.load('public/assets/sprites/enemies/zombie-normal/idle-back.png'),
      walkFront: loader.load('public/assets/sprites/enemies/zombie-normal/walk-front.png'),
      walkBack:  loader.load('public/assets/sprites/enemies/zombie-normal/walk-back.png'),
    };
    for(const key in sheets){
      const tex = sheets[key];
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.NearestFilter;
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.wrapS = THREE.ClampToEdgeWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
    }
    const initTex = sheets.idleFront;
    initTex.repeat.set(1/4, 1);
    initTex.offset.set(0, 0);

    const spriteMat = new THREE.SpriteMaterial({
      map: initTex,
      transparent: true,
      depthWrite: false,
    });
    const sprite = new THREE.Sprite(spriteMat);
    const bossScale = z.isBoss ? 1.8 : 1.3;
    sprite.scale.set(bossScale, bossScale, 1);
    sprite.position.y = 0.65;
    sprite.center.set(0.5, 0.3);
    group.add(sprite);

    // Health bar background
    const hbBgGeo = new THREE.PlaneGeometry(0.44, 0.065);
    const hbBgMat = new THREE.MeshBasicMaterial({color: 0x333333, side: THREE.DoubleSide, depthWrite: false, transparent: true});
    const hbBg = new THREE.Mesh(hbBgGeo, hbBgMat);
    hbBg.position.y = 1.35;
    group.add(hbBg);

    // Health bar fill
    const hbGeo = new THREE.PlaneGeometry(0.42, 0.05);
    const hbMat = new THREE.MeshBasicMaterial({color: 0xdd4444, side: THREE.DoubleSide, depthWrite: false, transparent: true});
    const hb = new THREE.Mesh(hbGeo, hbMat);
    hb.position.y = 1.35;
    group.add(hb);

    return {group, hb, hbMat, sprite, spriteMat, sheets, currentSheet: 'idleFront'};
  }

  // ---- Shadow circle ----
  _makeShadow(){
    const geo = new THREE.CircleGeometry(0.28, 8);
    const mat = new THREE.MeshBasicMaterial({color: 0x000000, transparent: true, opacity: 0.35, depthWrite: false});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI/2;
    mesh.position.y = 0.01;
    return mesh;
  }

  // ---- Halo circle ----
  _makeHalo(color){
    const geo = new THREE.RingGeometry(0.22, 0.32, 12);
    const mat = new THREE.MeshBasicMaterial({color, transparent: true, opacity: 0.6, depthWrite: false, side: THREE.DoubleSide});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI/2;
    mesh.position.y = 0.02;
    return mesh;
  }

  // ---- Projectile pool ----
  _getProjMesh(){
    if(this.projPool.length>0) return this.projPool.pop();
    const geo = new THREE.SphereGeometry(0.1, 6, 4);
    const mat = new THREE.MeshToonMaterial({color: 0x44ddff, emissive: 0x44ddff, emissiveIntensity: 0.8});
    return new THREE.Mesh(geo, mat);
  }
  _getTrailMesh(){
    const geo = new THREE.SphereGeometry(0.065, 5, 3);
    const mat = new THREE.MeshBasicMaterial({color: 0x44ddff, transparent: true, opacity: 0.4, depthWrite: false});
    return new THREE.Mesh(geo, mat);
  }

  // ---- Particle pool ----
  _getParticleMesh(colorHex){
    if(this.particlePool.length>0){
      const m = this.particlePool.pop();
      m.material.color.setHex(colorHex);
      m.visible = true;
      return m;
    }
    const geo = new THREE.SphereGeometry(0.08, 4, 3);
    const mat = new THREE.MeshBasicMaterial({color: colorHex, transparent: true, opacity: 1, depthWrite: false});
    return new THREE.Mesh(geo, mat);
  }

  // ---- Damage number sprite ----
  _makeDmgSprite(text, color){
    const c = document.createElement('canvas');
    c.width = 128; c.height = 64;
    const ctx = c.getContext('2d');
    ctx.font = 'bold 38px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 5;
    ctx.strokeText(text, 64, 32);
    ctx.fillStyle = color;
    ctx.fillText(text, 64, 32);
    const tex = new THREE.CanvasTexture(c);
    const mat = new THREE.SpriteMaterial({map: tex, transparent: true, depthWrite: false});
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(0.8, 0.4, 1);
    return sprite;
  }

  // ---- Main render method ----
  render(dt){
    const s = dt/1000;
    const t = state.gameTime;
    const p = state.player;

    // Rebuild walls if map changed
    if(state.mapVersion !== this.lastMapVersion){
      // Remove destroyed wall meshes
      if(this._destWallMeshes){
        this._destWallMeshes = this._destWallMeshes.filter(m => {
          if(MAP[m.userData.r][m.userData.c] !== WDEST){
            this.scene.remove(m);
            m.geometry.dispose();
            return false;
          }
          return true;
        });
      }
      // Remove destroyed furniture sprites
      this.furnitureMeshes = this.furnitureMeshes.filter(sprite => {
        const f = sprite.userData.furniture;
        if(!f) return true;
        // Check if any of its tiles are no longer FURNITURE
        let destroyed = false;
        for(let dr=0; dr<(f.h||1); dr++){
          for(let dc=0; dc<f.w; dc++){
            if(MAP[f.r+dr]?.[f.c+dc] !== FURNITURE) destroyed = true;
          }
        }
        if(destroyed){
          this.scene.remove(sprite);
          sprite.material.dispose();
          return false;
        }
        return true;
      });
      this.lastMapVersion = state.mapVersion;
    }

    // Camera follow player with lerp
    const targetX = p.x;
    const targetZ = p.y;
    this.camTarget.x += (targetX - this.camTarget.x)*0.08;
    this.camTarget.z += (targetZ - this.camTarget.z)*0.08;
    this.camera.position.x += (this.camTarget.x - this.camera.position.x + 0)*0.08;
    this.camera.position.z += (this.camTarget.z + 10 - this.camera.position.z)*0.08;
    this.camera.position.y = 12;
    this.camera.lookAt(this.camTarget.x, 0, this.camTarget.z);

    // Water animation
    if(this._waterPlanes){
      for(const wp of this._waterPlanes){
        const pos = wp.posAttr;
        for(let i=0; i<pos.count; i++){
          const x = pos.getX(i) + wp.c + 0.5;
          const z = pos.getZ(i) + wp.r + 0.5;
          pos.setY(i, Math.sin(t*2 + x*0.8 + z*0.6)*0.04);
        }
        pos.needsUpdate = true;
      }
    }

    // Torch flicker
    for(const {light} of this.torchLights){
      light.intensity = light.baseIntensity * (0.85 + Math.sin(t*8 + light.position.x*3)*0.15);
    }

    // Player
    const pm = this.playerMesh;
    const bobY = p.moving ? 0.06*Math.abs(Math.sin(p.bobTimer)) : 0.03*Math.sin(p.bobTimer*2);
    pm.group.position.set(p.x, bobY, p.y);
    // Invincibility blink
    pm.group.visible = !(p.invincible > 0 && Math.floor(t*12) % 2 === 0);

    // Select correct sprite sheet based on direction
    const sheetKey = p.facingDown
      ? (p.moving ? 'walkFront' : 'idleFront')
      : (p.moving ? 'walkBack' : 'idleBack');
    const numFrames = p.moving ? 6 : 4;

    if(pm.currentSheet !== sheetKey){
      // Switch texture
      const newTex = pm.sheets[sheetKey];
      newTex.repeat.set(1/numFrames, 1);
      newTex.offset.set(0, 0);
      pm.spriteMat.map = newTex;
      pm.spriteMat.needsUpdate = true;
      pm.currentSheet = sheetKey;
    }

    // Update frame offset
    const frame = p.frame % numFrames;
    pm.spriteMat.map.offset.set(frame / numFrames, 0);

    // Health bar
    const pRatio = p.hp/p.maxHp;
    pm.hb.scale.x = Math.max(0.001, pRatio);
    pm.hb.position.x = -(0.24 * (1-pRatio));
    // Make health bar face camera
    pm.hb.lookAt(this.camera.position);
    pm.hb.parent.children[pm.hb.parent.children.length-2]?.lookAt?.(this.camera.position);

    // Player shadow and halo
    this.playerShadow.position.set(p.x, 0.01, p.y);
    this.playerHalo.position.set(p.x, 0.02, p.y);
    this.playerHalo.material.opacity = 0.4 + 0.2*Math.sin(t*2);

    // Zombies
    for(let i=0; i<this.zombieMeshes.length; i++){
      const zm = this.zombieMeshes[i];
      const z = zm.zRef;
      if(z.hp<=0){
        zm.group.visible = false;
        zm.shadow.visible = false;
        zm.halo.visible = false;
        continue;
      }
      zm.group.visible = true;
      zm.shadow.visible = true;
      zm.halo.visible = true;
      const bobOff = z.moving ? 0.04*Math.abs(Math.sin(z.bobTimer)) : 0.02*Math.sin(z.bobTimer);
      zm.group.position.set(z.x, bobOff, z.y);
      zm.shadow.position.set(z.x, 0.01, z.y);
      zm.halo.position.set(z.x, 0.02, z.y);
      zm.halo.material.opacity = 0.3 + 0.15*Math.sin(t*2 + i);

      // Sprite sheet animation
      const zp = zm.parts;
      if(zp.sheets){
        const facingDown = z.facingDy > 0;
        const sheetKey = facingDown
          ? (z.moving ? 'walkFront' : 'idleFront')
          : (z.moving ? 'walkBack' : 'idleBack');
        const numFrames = z.moving ? 6 : 4;

        if(zp.currentSheet !== sheetKey){
          const newTex = zp.sheets[sheetKey];
          newTex.repeat.set(1/numFrames, 1);
          newTex.offset.set(0, 0);
          zp.spriteMat.map = newTex;
          zp.spriteMat.needsUpdate = true;
          zp.currentSheet = sheetKey;
        }
        const frame = (z.frame || 0) % numFrames;
        zp.spriteMat.map.offset.set(frame / numFrames, 0);
      }

      // Health bar
      const zRatio = z.hp/z.maxHp;
      zp.hb.scale.x = Math.max(0.001, zRatio);
      zp.hb.position.x = -(0.21*(1-zRatio));
      zp.hb.lookAt(this.camera.position);
    }

    // Projectiles
    // Remove stale
    const activeProjSet = new Set(state.projectiles);
    for(const [key, mesh] of this.activeProjMeshes){
      if(!activeProjSet.has(key)){
        this.scene.remove(mesh.main);
        this.projPool.push(mesh.main);
        for(const tr of mesh.trails){ this.scene.remove(tr); }
        this.activeProjMeshes.delete(key);
      }
    }
    // Add/update active
    for(const proj of state.projectiles){
      if(!this.activeProjMeshes.has(proj)){
        const main = this._getProjMesh();
        this.scene.add(main);
        const trails = [];
        for(let ti=0; ti<8; ti++){
          const tr = this._getTrailMesh();
          this.scene.add(tr);
          trails.push(tr);
        }
        this.activeProjMeshes.set(proj, {main, trails});
      }
      const {main, trails} = this.activeProjMeshes.get(proj);
      main.position.set(proj.x, 0.4, proj.y);
      // Trail
      for(let ti=0; ti<trails.length; ti++){
        const tr = trails[ti];
        if(ti < proj.trail.length){
          const pt = proj.trail[proj.trail.length-1-ti];
          tr.position.set(pt.x, 0.4, pt.y);
          tr.material.opacity = pt.a*0.4;
          tr.scale.setScalar(1 - ti*0.1);
          tr.visible = true;
        } else {
          tr.visible = false;
        }
      }
    }

    // Particles
    // Remove stale
    const activeParticleSet = new Set(state.particles);
    for(let i=this.activeParticles.length-1; i>=0; i--){
      const ap = this.activeParticles[i];
      if(!activeParticleSet.has(ap.ref)){
        this.scene.remove(ap.mesh);
        ap.mesh.visible = false;
        this.particlePool.push(ap.mesh);
        this.activeParticles.splice(i,1);
      }
    }
    // Add new
    const particleMeshRefs = new Set(this.activeParticles.map(ap=>ap.ref));
    for(const pt of state.particles){
      if(!particleMeshRefs.has(pt)){
        const mesh = this._getParticleMesh(pt.colorHex);
        this.scene.add(mesh);
        this.activeParticles.push({ref: pt, mesh});
      }
    }
    // Update
    for(const ap of this.activeParticles){
      const pt = ap.ref;
      ap.mesh.position.set(pt.x, 0.3 + (1-pt.alpha)*0.5, pt.y);
      ap.mesh.scale.setScalar(pt.radius * 10 * pt.alpha);
      ap.mesh.material.opacity = Math.max(0, pt.alpha);
    }

    // Damage numbers (sprites)
    // Remove stale
    const activeDmgSet = new Set(state.dmgNumbers);
    for(let i=this.dmgSprites.length-1; i>=0; i--){
      const ds = this.dmgSprites[i];
      if(!activeDmgSet.has(ds.ref)){
        this.scene.remove(ds.sprite);
        ds.sprite.material.map.dispose();
        ds.sprite.material.dispose();
        this.dmgSprites.splice(i,1);
      }
    }
    const dmgRefs = new Set(this.dmgSprites.map(ds=>ds.ref));
    for(const d of state.dmgNumbers){
      if(!dmgRefs.has(d)){
        const sprite = this._makeDmgSprite(d.text, d.color);
        this.scene.add(sprite);
        this.dmgSprites.push({ref: d, sprite});
      }
    }
    for(const ds of this.dmgSprites){
      const d = ds.ref;
      ds.sprite.position.set(d.x, 1.5 + d.timer*0.8, d.y);
      ds.sprite.material.opacity = Math.max(0, 1-d.timer/0.8);
    }

    this.renderer.render(this.scene, this.camera);
  }
}

// ==================== HUD UPDATE ====================
const zombieCountEl = document.getElementById('zombie-count');
const pointsEl = document.getElementById('points-display');
const heartsEl = document.getElementById('hearts');
const overlayEl = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayPoints = document.getElementById('overlay-points');
const btnRestart = document.getElementById('btn-restart');
const btnReplay = document.getElementById('btn-replay');
const btnMenu = document.getElementById('btn-menu');

function updateHUD(){
  const p = state.player;
  const alive = state.zombies.filter(z=>z.hp>0).length;
  zombieCountEl.textContent = `Zombies: ${alive}`;
  pointsEl.textContent = `${p.points} pts`;

  // Hearts
  let h = '';
  for(let i=0;i<3;i++) h += p.hp>=(i+1)*2 ? '❤️' : (p.hp>=i*2+1 ? '💔' : '🖤');
  heartsEl.textContent = h;

  // Overlay
  if(state.gameState==='victory'){
    overlayEl.style.display = 'flex';
    overlayTitle.textContent = 'VICTOIRE !';
    overlayTitle.style.color = '#44ff44';
    overlayPoints.textContent = `${p.points} points`;
    btnRestart.style.display = 'block';
    btnReplay.style.display = 'none';
    btnMenu.style.display = 'none';
  } else if(state.gameState==='gameover'){
    overlayEl.style.display = 'flex';
    overlayTitle.textContent = 'GAME OVER';
    overlayTitle.style.color = '#ff4444';
    overlayPoints.textContent = `${p.points} points`;
    btnRestart.style.display = 'none';
    btnReplay.style.display = 'block';
    btnMenu.style.display = 'block';
  } else {
    overlayEl.style.display = 'none';
  }
}

// Restart / Replay key handling
window.addEventListener('keydown', e => {
  if(e.key.toLowerCase()==='r'){
    if(state.gameState==='victory') location.reload();
    else if(state.gameState==='gameover'){
      state.player.hp = state.player.maxHp;
      state.player.points = Math.max(0, state.player.points-100);
      state.player.invincible = 2000;
      state.gameState = 'playing';
    }
  }
  if(e.key.toLowerCase()==='m' && state.gameState==='gameover') location.reload();
});
btnRestart.addEventListener('click', ()=> location.reload());
btnReplay.addEventListener('click', ()=>{
  state.player.hp = state.player.maxHp;
  state.player.points = Math.max(0, state.player.points-100);
  state.player.invincible = 2000;
  state.gameState = 'playing';
});
btnMenu.addEventListener('click', ()=> location.reload());

// ==================== GAME LOOP ====================
let renderer3d = null;
let lastTime = 0;

function gameLoop(time=0){
  const dt = Math.min(time - lastTime, 50);
  lastTime = time;
  update(dt);
  if(renderer3d) renderer3d.render(dt);
  updateHUD();
  requestAnimationFrame(gameLoop);
}

// Load map JSON then start
async function startGame(){
  try {
    await loadMapJSON('public/assets/maps/level-1-manoir.json');
  } catch(e) {
    console.warn('Failed to load level-1-manoir.json, falling back to level-1.json', e);
    await loadMapJSON('public/assets/maps/level-1.json');
  }
  state.gameState = 'playing';
  renderer3d = new ThreeRenderer();
  requestAnimationFrame(gameLoop);
}

startGame();
</script>
