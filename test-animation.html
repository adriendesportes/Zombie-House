<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Zombie House — Test Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }
    h1 { margin-bottom: 20px; font-size: 24px; }
    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      align-items: center;
    }
    .controls label { font-size: 14px; }
    .controls select, .controls input {
      background: #2a2a4a;
      color: #eee;
      border: 1px solid #444;
      padding: 5px 10px;
      border-radius: 4px;
    }
    .preview-area {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .preview-box {
      background: #2a2a4a;
      border: 2px solid #444;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }
    .preview-box h3 {
      margin-bottom: 10px;
      color: #88ccff;
    }
    .sprite-container {
      position: relative;
      overflow: hidden;
      margin: 10px auto;
      image-rendering: pixelated;
      background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 0 0 / 16px 16px;
      border: 1px solid #555;
    }
    .sprite-img {
      position: absolute;
      top: 0;
      left: 0;
      image-rendering: pixelated;
    }
    .info {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
    .frames-strip {
      display: flex;
      gap: 4px;
      margin-top: 10px;
      justify-content: center;
    }
    .frames-strip .frame {
      width: 64px;
      height: 64px;
      overflow: hidden;
      image-rendering: pixelated;
      background: repeating-conic-gradient(#333 0% 25%, #222 0% 50%) 0 0 / 8px 8px;
      border: 1px solid #555;
      position: relative;
    }
    .frames-strip .frame.active {
      border-color: #88ccff;
      box-shadow: 0 0 8px #88ccff55;
    }
    .frames-strip .frame img {
      position: absolute;
      top: 0;
      left: 0;
      image-rendering: pixelated;
    }
    .size-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
    }
    .size-buttons button {
      background: #3a3a5a;
      color: #eee;
      border: 1px solid #555;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    .size-buttons button.active {
      background: #4488cc;
      border-color: #88ccff;
    }
  </style>
</head>
<body>
  <h1>Zombie House — Test Animation Sprites</h1>

  <div class="controls">
    <label>Animation:
      <select id="animSelect">
        <option value="idle" data-frames="4" data-src="public/assets/sprites/heroes/angel-monster/idle.png">Idle (4 frames)</option>
        <option value="walk" data-frames="6" data-src="public/assets/sprites/heroes/angel-monster/walk.png" selected>Walk (6 frames)</option>
      </select>
    </label>
    <label>Vitesse:
      <input type="range" id="speedSlider" min="50" max="500" value="150" step="10">
      <span id="speedLabel">150ms</span>
    </label>
    <label>Taille affichage:</label>
    <div class="size-buttons">
      <button data-scale="1">1x (128px)</button>
      <button data-scale="2" class="active">2x (256px)</button>
      <button data-scale="3">3x (384px)</button>
    </div>
  </div>

  <div class="preview-area">
    <div class="preview-box">
      <h3>Animation</h3>
      <div class="sprite-container" id="spriteContainer" style="width: 256px; height: 256px;">
        <img class="sprite-img" id="spriteImg">
      </div>
      <div class="info" id="frameInfo">Frame 1/6</div>
      <div class="frames-strip" id="framesStrip"></div>
    </div>
  </div>

  <script>
    const FRAME_SIZE = 128;
    let currentFrame = 0;
    let numFrames = 6;
    let intervalId = null;
    let scale = 2;

    const spriteContainer = document.getElementById('spriteContainer');
    const spriteImg = document.getElementById('spriteImg');
    const frameInfo = document.getElementById('frameInfo');
    const framesStrip = document.getElementById('framesStrip');
    const animSelect = document.getElementById('animSelect');
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');

    function loadAnimation() {
      const option = animSelect.selectedOptions[0];
      const src = option.dataset.src;
      numFrames = parseInt(option.dataset.frames);
      currentFrame = 0;

      spriteImg.src = src;
      spriteImg.style.height = (FRAME_SIZE * scale) + 'px';
      spriteImg.style.width = (FRAME_SIZE * numFrames * scale) + 'px';

      spriteContainer.style.width = (FRAME_SIZE * scale) + 'px';
      spriteContainer.style.height = (FRAME_SIZE * scale) + 'px';

      // Build frames strip
      framesStrip.innerHTML = '';
      for (let i = 0; i < numFrames; i++) {
        const div = document.createElement('div');
        div.className = 'frame' + (i === 0 ? ' active' : '');
        const img = document.createElement('img');
        img.src = src;
        img.style.width = (numFrames * 64) + 'px';
        img.style.height = '64px';
        img.style.left = (-i * 64) + 'px';
        div.appendChild(img);
        framesStrip.appendChild(div);
      }

      restartAnimation();
    }

    function updateFrame() {
      const offset = -currentFrame * FRAME_SIZE * scale;
      spriteImg.style.left = offset + 'px';
      frameInfo.textContent = `Frame ${currentFrame + 1}/${numFrames}`;

      // Update strip
      const frames = framesStrip.querySelectorAll('.frame');
      frames.forEach((f, i) => f.classList.toggle('active', i === currentFrame));

      currentFrame = (currentFrame + 1) % numFrames;
    }

    function restartAnimation() {
      if (intervalId) clearInterval(intervalId);
      currentFrame = 0;
      updateFrame();
      intervalId = setInterval(updateFrame, parseInt(speedSlider.value));
    }

    function setScale(s) {
      scale = s;
      document.querySelectorAll('.size-buttons button').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.scale) === s);
      });
      loadAnimation();
    }

    // Events
    animSelect.addEventListener('change', loadAnimation);
    speedSlider.addEventListener('input', () => {
      speedLabel.textContent = speedSlider.value + 'ms';
      restartAnimation();
    });
    document.querySelectorAll('.size-buttons button').forEach(btn => {
      btn.addEventListener('click', () => setScale(parseInt(btn.dataset.scale)));
    });

    // Init
    loadAnimation();
  </script>
</body>
</html>
