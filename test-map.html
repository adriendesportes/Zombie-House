<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Zombie House — Test Map</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; touch-action: none; }
    canvas { display: block; image-rendering: pixelated; }
    #info {
      position: fixed; top: 8px; left: 8px; color: #88ccff;
      font-family: monospace; font-size: 11px; z-index: 10;
      background: rgba(0,0,0,0.8); padding: 6px 10px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="info">ZQSD / Flèches &bull; Touch: glisser</div>
  <canvas id="game"></canvas>

  <script>
    const TILE = 32;
    const SCALE = 2;
    const TS = TILE * SCALE; // tile on screen
    const PLAYER_SPEED = 2.5;
    const ANIM_SPEED = 140;
    const SPRITE_SIZE = 128; // sprite frame size

    // Tile IDs (match tileset grid: col + row*6)
    const F1=0, F2=1, F3=2, F4=3, FC=4, CR=5;
    const WT=6, WB=7, WL=8, WR=9, CTL=10, CTR=11;
    const CBL=12, CBR=13, DC=14, DO=15, DS=16, DSO=17;
    const TB=18, BK=19, CN=20, CH=21, CW=22, BR=23;
    const __=-1; // empty

    // ============ MAP: Manoir hanté — Étage 1 ============
    // 30 cols x 24 rows
    const FLOOR = [
      // Extérieur / entrée (rows 0-5)
      [F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3],
      [F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3],
      [F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3],
      // Hall d'entrée (rows 3-10)
      [F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1],
      [F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F1],
      [F1,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1],
      [F1,F2,F1,F2,F1,F2,F1,F2,F1,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,F2,F1,F2,F1,F2,F1,F2,F1,F1],
      [F1,F1,F2,F1,F2,F1,F2,F1,F2,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,F1,F2,F1,F2,F1,F2,F1,F2,F1],
      [F1,F2,F1,F2,F1,F2,F1,F2,F1,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,CR,F2,F1,F2,F1,F2,F1,F2,F1,F1],
      [F1,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1],
      [F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F1],
      [F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1],
      // Bibliothèque (rows 12-17)
      [F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F4,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F3],
      [F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F1,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3],
      [F1,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F3],
      [F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F1,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3],
      [F1,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F2,F1,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F4,F3,F3],
      [F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F1,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3,F3],
      // Cuisine (rows 18-23)
      [FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC],
      [FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC],
      [FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC],
      [FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC],
      [FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC],
      [FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC,FC],
    ];

    const WALLS = [
      // Row 0-2: murs extérieurs haut
      [CTL,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,CTR,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__],
      [WL,__,__,__,__,__,__,__,__,__,__,__,__,WR,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__],
      [WL,__,__,__,__,__,__,__,__,__,__,__,__,WR,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__],
      // Row 3: mur haut hall
      [CBL,WB,WB,WB,WB,DC,WB,WB,WB,WB,WB,WB,WB,CBR,CTL,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,CTR],
      [__,__,__,__,__,__,__,__,__,__,__,__,__,__,WL,__,__,__,__,__,__,__,__,__,__,__,__,__,__,WR],
      [__,__,__,__,__,__,__,__,__,__,__,__,__,__,WL,__,__,__,__,__,__,__,__,__,__,__,__,__,__,WR],
      [__,__,__,__,__,__,__,__,__,__,__,__,__,__,WL,__,__,__,CN,__,__,__,CN,__,__,__,__,__,__,WR],
      [__,__,__,__,__,__,__,__,__,__,__,__,__,__,WL,__,__,__,__,__,__,__,__,__,__,__,__,__,__,WR],
      [__,TB,__,__,__,__,__,TB,__,__,__,__,__,__,WL,__,__,__,__,__,__,__,__,__,__,__,__,__,__,WR],
      [__,__,__,__,CN,__,__,__,__,__,CN,__,__,__,WL,__,__,BK,__,__,__,__,__,BK,__,__,__,__,__,WR],
      [__,__,__,__,__,__,__,__,__,__,__,__,__,__,WL,__,__,BK,__,__,__,__,__,BK,__,__,__,__,__,WR],
      // Row 11: mur séparation hall / pièces du bas
      [CTL,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,DC,CBL,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,CBR],
      // Row 12-17: Vestiaire + Bibliothèque
      [WL,__,__,__,__,__,__,__,__,__,__,__,__,__,CTL,WT,WT,WT,WT,WT,WT,WT,DC,WT,WT,WT,WT,WT,WT,CTR],
      [WL,__,__,__,__,__,__,__,__,__,CH,__,__,__,WL,__,__,__,__,__,__,__,__,__,__,__,__,__,__,WR],
      [WL,__,BR,__,__,__,__,__,BR,__,__,__,__,__,WL,__,__,__,__,__,TB,__,__,__,__,__,__,__,__,WR],
      [WL,__,__,__,__,__,__,__,__,__,__,__,__,__,WL,__,__,__,CH,__,__,__,CH,__,__,__,__,__,__,WR],
      [WL,__,__,__,CW,__,__,__,__,__,__,CW,__,__,WL,__,__,__,__,__,__,__,__,__,__,__,CN,__,__,WR],
      [CBL,WB,WB,WB,WB,WB,WB,DC,WB,WB,WB,WB,WB,CBR,CBL,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,CBR],
      // Row 18-23: Cuisine
      [CTL,WT,WT,WT,WT,WT,WT,DC,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,WT,CTR],
      [WL,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,WR],
      [WL,__,TB,__,TB,__,__,__,__,__,TB,__,TB,__,__,__,__,__,BR,__,__,BR,__,__,BR,__,__,BR,__,WR],
      [WL,__,__,__,__,__,__,__,__,__,__,__,__,__,__,CN,__,__,__,__,__,__,__,__,__,__,__,__,__,WR],
      [WL,__,CH,__,CH,__,__,CN,__,__,CH,__,CH,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,__,WR],
      [CBL,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,WB,CBR],
    ];

    // Collision map (1=blocked)
    const COL = WALLS.map(row => row.map(t => {
      if (t === __) return 0;
      if (t === DC || t === DO) return 0; // doors passable
      if (t === TB || t === BK || t === BR || t === CH) return 1; // furniture blocks
      if (t === CN || t === CW) return 0; // candelabra/cobweb passable
      return 1; // walls block
    }));

    const COLS = FLOOR[0].length;
    const ROWS = FLOOR.length;
    const TS_COLS = 6;

    // Canvas size = viewport (not full map)
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Assets
    const tilesetImg = new Image();
    const idleImg = new Image();
    const walkImg = new Image();
    let loaded = 0;
    function onLoad() { if (++loaded === 3) requestAnimationFrame(gameLoop); }
    tilesetImg.onload = onLoad; idleImg.onload = onLoad; walkImg.onload = onLoad;
    tilesetImg.src = 'public/assets/tilesets/manor-tileset.png';
    idleImg.src = 'public/assets/sprites/heroes/angel-monster/idle.png';
    walkImg.src = 'public/assets/sprites/heroes/angel-monster/walk.png';

    // Player
    const player = {
      x: 7 * TILE + TILE/2,  // Hall d'entrée
      y: 7 * TILE + TILE/2,
      frame: 0, animTimer: 0, moving: false
    };

    // Input
    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
    window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
    let touchStart = null, touchDelta = {x:0,y:0};
    canvas.addEventListener('touchstart', e => { touchStart = {x:e.touches[0].clientX, y:e.touches[0].clientY}; e.preventDefault(); });
    canvas.addEventListener('touchmove', e => { if(touchStart){touchDelta.x=e.touches[0].clientX-touchStart.x; touchDelta.y=e.touches[0].clientY-touchStart.y;} e.preventDefault(); });
    canvas.addEventListener('touchend', () => { touchStart=null; touchDelta={x:0,y:0}; });

    function getMovement() {
      let dx=0, dy=0;
      if (keys['z']||keys['w']||keys['arrowup']) dy=-1;
      if (keys['s']||keys['arrowdown']) dy=1;
      if (keys['q']||keys['a']||keys['arrowleft']) dx=-1;
      if (keys['d']||keys['arrowright']) dx=1;
      if (touchStart) {
        if (Math.abs(touchDelta.x)>20) dx+=Math.sign(touchDelta.x);
        if (Math.abs(touchDelta.y)>20) dy+=Math.sign(touchDelta.y);
      }
      if (dx&&dy) { dx*=0.707; dy*=0.707; }
      return {dx,dy};
    }

    function isBlocked(px, py) {
      const hb = 6;
      for (const [cx,cy] of [[px-hb,py-hb],[px+hb,py-hb],[px-hb,py+hb],[px+hb,py+hb]]) {
        const c=Math.floor(cx/TILE), r=Math.floor(cy/TILE);
        if (r<0||r>=ROWS||c<0||c>=COLS) return true;
        if (COL[r][c]) return true;
      }
      return false;
    }

    function update(dt) {
      const {dx,dy} = getMovement();
      player.moving = dx!==0||dy!==0;
      if (player.moving) {
        const nx=player.x+dx*PLAYER_SPEED, ny=player.y+dy*PLAYER_SPEED;
        if (!isBlocked(nx,ny)) { player.x=nx; player.y=ny; }
        else if (!isBlocked(nx,player.y)) player.x=nx;
        else if (!isBlocked(player.x,ny)) player.y=ny;
      }
      player.animTimer+=dt;
      if (player.animTimer>=ANIM_SPEED) {
        player.animTimer=0;
        player.frame=(player.frame+1)%(player.moving?6:4);
      }
    }

    function drawTile(id, sx, sy) {
      if (id<0) return;
      const tx=(id%TS_COLS)*TILE, ty=Math.floor(id/TS_COLS)*TILE;
      ctx.drawImage(tilesetImg, tx, ty, TILE, TILE, sx, sy, TS, TS);
    }

    function draw() {
      const vw=canvas.width, vh=canvas.height;
      // Camera centered on player
      const camX = player.x*SCALE - vw/2;
      const camY = player.y*SCALE - vh/2;

      ctx.fillStyle='#0a0a0f';
      ctx.fillRect(0,0,vw,vh);

      // Only draw visible tiles
      const startCol = Math.max(0, Math.floor(camX/TS));
      const endCol = Math.min(COLS, Math.ceil((camX+vw)/TS)+1);
      const startRow = Math.max(0, Math.floor(camY/TS));
      const endRow = Math.min(ROWS, Math.ceil((camY+vh)/TS)+1);

      for (let r=startRow; r<endRow; r++) {
        for (let c=startCol; c<endCol; c++) {
          const sx = c*TS - camX;
          const sy = r*TS - camY;
          drawTile(FLOOR[r][c], sx, sy);
          drawTile(WALLS[r][c], sx, sy);
        }
      }

      // Player
      const sheet = player.moving ? walkImg : idleImg;
      const drawSize = TS * 1.8;
      const px = player.x*SCALE - camX - drawSize/2;
      const py = player.y*SCALE - camY - drawSize/2;
      ctx.drawImage(sheet,
        player.frame*SPRITE_SIZE, 0, SPRITE_SIZE, SPRITE_SIZE,
        px, py, drawSize, drawSize
      );

      // Vignette effect (dark edges)
      const grd = ctx.createRadialGradient(vw/2,vh/2,vw*0.3, vw/2,vh/2,vw*0.7);
      grd.addColorStop(0, 'rgba(0,0,0,0)');
      grd.addColorStop(1, 'rgba(0,0,0,0.6)');
      ctx.fillStyle = grd;
      ctx.fillRect(0,0,vw,vh);
    }

    let lastTime=0;
    function gameLoop(time=0) {
      update(time-lastTime);
      lastTime=time;
      draw();
      requestAnimationFrame(gameLoop);
    }
  </script>
</body>
</html>
